<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação de P1 - Baião</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>✅🥷✅--Quadro Kanban--✅☠️✅</h1>

    <div class="inCard">
        <input type="text" id="inBox" placeholder="Digite a Tarefa">
        <button onclick="novocard()">Adicionar</button>
    </div>

    <div class="colunas">
        <div class="coluna" id="col01" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>A Realizar! 🧐</h2>
        </div>

        <div class="coluna" id="col02" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Realizando! 💻</h2>
        </div>

        <div class="coluna" id="col03" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Realizado! 🗄️</h2>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
